# =============================================================================
# Debian Preseed Template
# Do not edit dist/preseed.cfg directly — edit this file and re-run generate_installer.py
# =============================================================================

# Locale & Keyboard
d-i debian-installer/locale string en_US.UTF-8
d-i keyboard-configuration/xkb-keymap select us

# Mirror
d-i mirror/country string US
d-i mirror/http/hostname string deb.debian.org
d-i mirror/http/directory string /debian
d-i mirror/http/proxy string

# Clock
d-i clock-setup/utc boolean true
d-i time/zone string $TIMEZONE$
d-i clock-setup/ntp boolean true

# Network 
d-i netcfg/choose_interface select auto
d-i netcfg/get_hostname string $HOSTNAME$
d-i netcfg/get_domain string localdomain
d-i netcfg/wireless_wep string

# Partitioning
d-i partman-auto/disk string $INSTALL_DISK$
d-i partman-auto/method string lvm
d-i partman-lvm/device_remove_lvm boolean true
d-i partman-md/device_remove_md boolean true
d-i partman-lvm/confirm boolean true
d-i partman-lvm/confirm_nooverwrite boolean true
d-i partman-auto-lvm/guided_size string max
d-i partman-auto/choose_recipe select atomic
d-i partman-partitioning/confirm_write_new_label boolean true
d-i partman/choose_partition select finish
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true

# Users & Passwords
d-i passwd/root-login boolean true
d-i passwd/root-password-crypted password $ROOT_HASH$
d-i passwd/user-fullname string $USER_FULLNAME$
d-i passwd/username string $USER_NAME$
d-i passwd/user-password-crypted password $USER_HASH$
d-i passwd/user-default-groups string sudo audio cdrom video plugdev

# Packages 
tasksel tasksel/first multiselect standard
d-i pkgsel/include string sudo curl ufw fail2ban unattended-upgrades apt-listchanges openssh-server
d-i pkgsel/upgrade select full-upgrade
popularity-contest popularity-contest/participate boolean false

# Suppress Reboot Confirmation Note
d-i finish-install/reboot_in_progress note

# Late Command 
d-i preseed/late_command string in-target sh -c ' \
    echo "=== PATH ===" ; \
    echo "export PATH=\$PATH:/sbin:/usr/sbin:/usr/bin:/bin" >> /root/.bashrc ; \
    echo "export PATH=\$PATH:/sbin:/usr/sbin:/usr/bin:/bin" >> /home/$USER_NAME$/.bashrc ; \
    echo "=== SSH key ===" ; \
    mkdir -p /home/$USER_NAME$/.ssh ; \
    echo "$PUBLIC_KEY$" >> /home/$USER_NAME$/.ssh/authorized_keys ; \
    chmod 700 /home/$USER_NAME$/.ssh ; \
    chmod 600 /home/$USER_NAME$/.ssh/authorized_keys ; \
    chown -R $USER_NAME$:$USER_NAME$ /home/$USER_NAME$/.ssh ; \
	echo "=== SSH hardening ===" ; \
    sed -i "s/^#Port 22/Port $SSH_PORT$/" /etc/ssh/sshd_config ; \
    sed -i "s/^Port 22/Port $SSH_PORT$/" /etc/ssh/sshd_config ; \
    sed -i "s/^#PasswordAuthentication yes/PasswordAuthentication no/" /etc/ssh/sshd_config ; \
    sed -i "s/^PasswordAuthentication yes/PasswordAuthentication no/" /etc/ssh/sshd_config ; \
    sed -i "s/^#PermitRootLogin .*/PermitRootLogin no/" /etc/ssh/sshd_config ; \
    sed -i "s/^PermitRootLogin .*/PermitRootLogin no/" /etc/ssh/sshd_config ; \
    grep -q "^PubkeyAuthentication" /etc/ssh/sshd_config || echo "PubkeyAuthentication yes" >> /etc/ssh/sshd_config ; \
	echo "=== UFW ===" ; \
    ufw default deny incoming ; \
    ufw default allow outgoing ; \
    ufw limit $SSH_PORT$/tcp ; \
    ufw allow 80/tcp ; \
    ufw allow 443/tcp ; \
    ufw --force enable ; \
	echo "=== Driver blacklist ===" ; \
    echo "blacklist b43" > /etc/modprobe.d/blacklist-b43.conf ; \
    echo "blacklist bcma" >> /etc/modprobe.d/blacklist-b43.conf ; \
    update-initramfs -u ; \
	echo "=== Static IP ===" ; \
    printf "auto lo\niface lo inet loopback\n\nauto %s\niface %s inet static\n    address %s\n    netmask %s\n    gateway %s\n    dns-nameservers %s\n" "$NET_IFACE$" "$NET_IFACE$" "$STATIC_IP$" "$NETMASK$" "$GATEWAY$" "$DNS_SERVERS$" > /etc/network/interfaces; \
	echo "=== Unattended upgrades ===" ; \
    systemctl enable unattended-upgrades ; \
    echo "=== fail2ban ===" ; \
    systemctl enable fail2ban ; \
    echo "=== Done ===" ; \
'
# ── Finish ────────────────────────────────────────────────────────────────────
d-i finish-install/reboot_in_progress note